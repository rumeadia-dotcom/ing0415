<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MarketCast — 다중 마켓 상품 자동 등록 SaaS. 로그인 페이지">
  <meta name="robots" content="noindex,nofollow">
  <title>로그인 — MarketCast</title>
  <link rel="stylesheet" href="../_shared/styles.css">
  <!--
    상태 분기 시뮬레이션 (정적 HTML — JS 없음):
      - 에러 상태: .auth-card 내 <div class="alert alert-error">…</div> 를 노출
      - 로딩 상태: 제출 버튼에 disabled + 텍스트를 "로그인 중…" 으로 교체
      - 비밀번호 표시: .input-wrap .input-suffix 의 svg use 를 #i-eye-off 로 교체
  -->
</head>
<body>

  <!-- 사이드바 없는 전체 화면 (auth-shell) -->
  <div class="auth-shell">

    <!-- 상단 미니 토픽바: 테마 토글만 (브랜드는 카드 안) -->
    <header class="auth-topbar">
      <span></span>
      <button type="button" class="icon-btn" aria-label="테마 변경: 현재 라이트 모드" data-theme-toggle>
        <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-sun"/></svg>
      </button>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="auth-title">

        <!-- ====== 카드 헤더 ====== -->
        <header class="auth-card-header">
          <div class="brand">
            <span class="sidebar-logo" aria-hidden="true">M</span>
            <span class="t-h2">MarketCast</span>
          </div>
          <h1 id="auth-title">로그인</h1>
          <p>다중 마켓 상품 자동 등록 SaaS</p>
        </header>

        <!-- ====== 탭: 이메일 / 소셜 ====== -->
        <div class="tabs" role="tablist" aria-label="로그인 방식">
          <button type="button" class="tab tab-active" role="tab" aria-selected="true" aria-controls="panel-email" id="tab-email">
            이메일 로그인
          </button>
          <button type="button" class="tab" role="tab" aria-selected="false" aria-controls="panel-social" id="tab-social" tabindex="-1">
            소셜 로그인
          </button>
        </div>

        <!-- ====== 패널: 이메일 로그인 (기본 활성) ====== -->
        <section id="panel-email" role="tabpanel" aria-labelledby="tab-email" style="margin-top: var(--sp-5);">

          <form action="#" method="post" novalidate>

            <!-- 이메일 -->
            <div class="field">
              <label for="email" class="label">
                이메일 <span class="req" aria-hidden="true">*</span>
                <span class="sr-only">필수</span>
              </label>
              <input
                id="email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="username"
                placeholder="you@example.com"
                class="input"
                required
                aria-required="true"
                aria-describedby="email-error"
              >
              <!-- 에러 상태일 때만 노출 (정적 HTML 에서는 빈 상태로 자리 유지) -->
              <p id="email-error" class="field-error" role="alert" hidden>
                <!-- 예시: 올바른 이메일 형식이 아닙니다 -->
              </p>
            </div>

            <!-- 비밀번호 -->
            <div class="field">
              <label for="password" class="label">
                비밀번호 <span class="req" aria-hidden="true">*</span>
                <span class="sr-only">필수</span>
              </label>
              <div class="input-wrap">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="비밀번호 입력"
                  class="input"
                  required
                  aria-required="true"
                  aria-describedby="password-error"
                >
                <button
                  type="button"
                  class="input-suffix"
                  aria-label="비밀번호 표시"
                  aria-pressed="false"
                  data-toggle-password="password"
                >
                  <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-eye"/></svg>
                </button>
              </div>
              <p id="password-error" class="field-error" role="alert" hidden>
                <!-- 예시 -->
              </p>
            </div>

            <!--
              에러 상태 예시 (정적 — 주석으로 보존):
              <div class="alert alert-error" role="alert" style="margin-top: var(--sp-4);">
                <svg class="alert-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-alert"/></svg>
                <div class="alert-body">
                  <p class="alert-title">로그인 실패</p>
                  <p class="alert-message">이메일 또는 비밀번호가 올바르지 않습니다.</p>
                </div>
              </div>
            -->

            <!-- 제출 버튼 -->
            <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-5);">
              로그인
            </button>

          </form>
        </section>

        <!-- ====== 패널: 소셜 로그인 (기본 숨김) ====== -->
        <section id="panel-social" role="tabpanel" aria-labelledby="tab-social" hidden style="margin-top: var(--sp-5);">

          <div class="stack" style="gap: var(--sp-2);">

            <button type="button" class="social-btn google" aria-label="Google 계정으로 계속하기">
              <svg class="social-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-social-google"/></svg>
              <span>Google 로 계속하기</span>
            </button>

            <button type="button" class="social-btn kakao" aria-label="Kakao 계정으로 계속하기">
              <svg class="social-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-social-kakao"/></svg>
              <span>Kakao 로 계속하기</span>
            </button>

            <button type="button" class="social-btn naver" aria-label="Naver 계정으로 계속하기">
              <svg class="social-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-social-naver"/></svg>
              <span>Naver 로 계속하기</span>
            </button>

          </div>

          <p class="t-xs t-subtle text-center mt-4">
            소셜 계정으로 가입 시 <a href="#">이용약관</a> 과 <a href="#">개인정보처리방침</a> 에 동의한 것으로 간주됩니다.
          </p>
        </section>

        <!-- ====== 카드 푸터: 보조 링크 ====== -->
        <footer class="auth-card-footer">
          <a href="./forgot-password.html">비밀번호를 잊으셨나요?</a>
          <span class="sep" aria-hidden="true">|</span>
          <a href="./signup.html">회원가입</a>
        </footer>

      </section>
    </main>

  </div>

</body>
</html>
