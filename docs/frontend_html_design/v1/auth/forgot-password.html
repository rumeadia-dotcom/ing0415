<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MarketCast — 비밀번호 재설정 메일 요청">
  <meta name="robots" content="noindex,nofollow">
  <title>비밀번호 찾기 — MarketCast</title>
  <link rel="stylesheet" href="../_shared/styles.css">
  <!--
    enumeration 방지 (features/auth.md §4.4):
      - 가입 여부와 무관하게 동일 성공 화면 표시.
      - 본 파일은 [form 상태] 와 [성공 안내 상태] 두 시점 마크업을 모두 포함.
        성공 안내는 .post-submit 컨테이너 (hidden) 안에 둠.
  -->
</head>
<body>

  <div class="auth-shell">

    <header class="auth-topbar">
      <a href="./login.html" class="btn btn-ghost btn-sm" aria-label="로그인으로 돌아가기">
        <svg class="btn-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-arrow-left"/></svg>
        <span>로그인</span>
      </a>
      <button type="button" class="icon-btn" aria-label="테마 변경: 현재 라이트 모드" data-theme-toggle>
        <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-sun"/></svg>
      </button>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="auth-title">

        <header class="auth-card-header">
          <div class="brand">
            <span class="sidebar-logo" aria-hidden="true">M</span>
            <span class="t-h2">MarketCast</span>
          </div>
          <h1 id="auth-title">비밀번호 재설정</h1>
          <p>가입 시 사용한 이메일을 입력하시면<br>재설정 링크를 보내드립니다.</p>
        </header>

        <!-- ===== 1. 폼 상태 (기본 노출) ===== -->
        <form action="#" method="post" novalidate class="pre-submit">

          <div class="field">
            <label for="email" class="label">
              이메일 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <input
              id="email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="you@example.com"
              class="input"
              required
              aria-required="true"
              aria-describedby="email-hint"
            >
            <p id="email-hint" class="field-hint">가입 시 사용한 이메일 주소</p>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-5);">
            재설정 메일 보내기
          </button>

        </form>

        <!-- ===== 2. 제출 후 안내 (정적 — JS 에서 .pre-submit 숨김 + 아래 노출) ===== -->
        <div class="post-submit" hidden>
          <div class="alert alert-success" role="status">
            <svg class="alert-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-check"/></svg>
            <div class="alert-body">
              <p class="alert-title">메일을 발송했습니다</p>
              <p class="alert-message">
                입력하신 이메일로 안내 메일을 보냈습니다.<br>
                메일이 도착하지 않으면 스팸함을 확인해주세요.
              </p>
            </div>
          </div>
          <p class="t-xs t-subtle text-center mt-4">
            (이미 가입된 경우에만 재설정 안내가 발송되며, 보안을 위해 동일한 안내가 표시됩니다.)
          </p>
        </div>

        <footer class="auth-card-footer">
          <a href="./login.html">로그인으로 돌아가기</a>
          <span class="sep" aria-hidden="true">|</span>
          <a href="./signup.html">회원가입</a>
        </footer>

      </section>
    </main>
  </div>

</body>
</html>
