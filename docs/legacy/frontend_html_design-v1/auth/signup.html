<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MarketCast — 회원가입">
  <meta name="robots" content="noindex,nofollow">
  <title>회원가입 — MarketCast</title>
  <link rel="stylesheet" href="../_shared/styles.css">
  <!--
    상태 분기 시뮬레이션:
      - 비밀번호 강도: .pw-meter 의 data-level 을 1~5 로 변경
      - 정책 충족: .pw-rules > li 에 .met 추가
      - 가입 직후 화면: 본 카드를 "이메일 인증 안내" 카드로 교체 (하단 주석 참고)
      - "가입하기" disabled: 정책 미충족 or 약관 미동의 → 버튼에 disabled +
        .tooltip[data-tip="비밀번호 정책 불충족 / 이용약관 동의 필요"]
  -->
</head>
<body>

  <div class="auth-shell">

    <header class="auth-topbar">
      <a href="./login.html" class="btn btn-ghost btn-sm" aria-label="로그인으로 돌아가기">
        <svg class="btn-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-arrow-left"/></svg>
        <span>로그인</span>
      </a>
      <button type="button" class="icon-btn" aria-label="테마 변경: 현재 라이트 모드" data-theme-toggle>
        <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-sun"/></svg>
      </button>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="auth-title">

        <header class="auth-card-header">
          <div class="brand">
            <span class="sidebar-logo" aria-hidden="true">M</span>
            <span class="t-h2">MarketCast</span>
          </div>
          <h1 id="auth-title">회원가입</h1>
          <p>이메일로 무료 계정을 만드세요</p>
        </header>

        <form action="#" method="post" novalidate>

          <!-- 표시 이름 -->
          <div class="field">
            <label for="display-name" class="label">
              표시 이름 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <input
              id="display-name"
              name="displayName"
              type="text"
              autocomplete="nickname"
              placeholder="셀러 이름 (2~20자)"
              maxlength="20"
              class="input"
              required
              aria-required="true"
              aria-describedby="display-name-hint"
            >
            <p id="display-name-hint" class="field-hint">대시보드 우측 상단에 표시됩니다. 나중에 변경 가능.</p>
          </div>

          <!-- 이메일 -->
          <div class="field">
            <label for="email" class="label">
              이메일 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <input
              id="email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="you@example.com"
              class="input"
              required
              aria-required="true"
              aria-describedby="email-hint"
            >
            <p id="email-hint" class="field-hint">로그인 ID 로 사용됩니다. 가입 후 인증 메일이 발송됩니다.</p>
          </div>

          <!-- 비밀번호 -->
          <div class="field">
            <label for="password" class="label">
              비밀번호 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <div class="input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                placeholder="10자 이상"
                class="input"
                required
                aria-required="true"
                minlength="10"
                aria-describedby="pw-rules"
              >
              <button
                type="button"
                class="input-suffix"
                aria-label="비밀번호 표시"
                aria-pressed="false"
                data-toggle-password="password"
              >
                <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-eye"/></svg>
              </button>
            </div>

            <!-- 비밀번호 강도 메터 (data-level: 0~5) -->
            <div class="pw-meter" data-level="3" aria-hidden="true">
              <div class="pw-meter-bars">
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
              </div>
              <span class="pw-meter-label">보통</span>
            </div>

            <!-- 정책 체크리스트 (li.met = 충족) -->
            <ul id="pw-rules" class="pw-rules">
              <li class="met">10자 이상</li>
              <li class="met">영문 대/소문자 포함</li>
              <li>숫자 포함</li>
              <li>특수문자 포함</li>
            </ul>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="field">
            <label for="password-confirm" class="label">
              비밀번호 확인 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <input
              id="password-confirm"
              name="passwordConfirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호 다시 입력"
              class="input"
              required
              aria-required="true"
              aria-describedby="password-confirm-error"
            >
            <p id="password-confirm-error" class="field-error" role="alert" hidden>
              <!-- 예시: 비밀번호가 일치하지 않습니다 -->
            </p>
          </div>

          <!-- 약관 / 마케팅 동의 -->
          <div class="stack mt-4" style="gap: var(--sp-2);">
            <label class="checkbox">
              <input type="checkbox" name="agreeTerms" required aria-required="true">
              <span>
                <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a> 에 동의합니다
                <span class="req" aria-hidden="true">*</span>
                <span class="sr-only">필수</span>
              </span>
            </label>

            <label class="checkbox">
              <input type="checkbox" name="agreeMarketing">
              <span>마케팅 정보 수신에 동의합니다 <span class="t-subtle">(선택)</span></span>
            </label>
          </div>

          <!--
            disabled 상태 예시 (정적, 참고용):
            <span class="tooltip full-width" data-tip="비밀번호 정책 불충족 · 이용약관 동의 필요">
              <button type="submit" class="btn btn-primary btn-lg btn-block" disabled>가입하기</button>
            </span>
          -->
          <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-5);">
            가입하기
          </button>

        </form>

        <footer class="auth-card-footer">
          이미 계정이 있으신가요? <a href="./login.html">로그인</a>
        </footer>

        <!--
          === 가입 직후 상태 (정적 — 참고용) ===
          위 form 을 아래 마크업으로 교체:

          <div class="text-center">
            <div class="alert alert-info" style="text-align: left;">
              <svg class="alert-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-mail"/></svg>
              <div class="alert-body">
                <p class="alert-title">이메일 인증을 완료해주세요</p>
                <p class="alert-message">
                  you@example.com 으로 인증 메일을 발송했습니다.<br>
                  메일함을 확인하고 링크를 클릭해주세요.
                </p>
              </div>
            </div>
            <div class="row mt-4" style="gap: var(--sp-2); justify-content: center;">
              <button type="button" class="btn btn-secondary">인증 메일 재전송</button>
              <a href="./login.html" class="btn btn-outline">로그인으로</a>
            </div>
          </div>
        -->

      </section>
    </main>
  </div>

</body>
</html>
