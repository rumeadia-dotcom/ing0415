<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MarketCast — 새 비밀번호 설정">
  <meta name="robots" content="noindex,nofollow">
  <title>비밀번호 재설정 — MarketCast</title>
  <link rel="stylesheet" href="../_shared/styles.css">
  <!--
    토큰 흐름:
      - 진입 URL: /reset-password?token=xxx (URL search param)
      - Supabase Auth recovery 세션이 유효하면 폼 노출
      - 만료 시: .token-expired 컨테이너 노출 (아래 주석 참고)

    상태 분기:
      - 정상: 폼 노출 (기본)
      - 토큰 만료: .form-section hidden + .token-expired 노출
      - 정책 미충족: 강도 메터 + 정책 리스트로 안내, "비밀번호 변경" disabled
  -->
</head>
<body>

  <div class="auth-shell">

    <header class="auth-topbar">
      <span></span>
      <button type="button" class="icon-btn" aria-label="테마 변경: 현재 라이트 모드" data-theme-toggle>
        <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-sun"/></svg>
      </button>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="auth-title">

        <header class="auth-card-header">
          <div class="brand">
            <span class="sidebar-logo" aria-hidden="true">M</span>
            <span class="t-h2">MarketCast</span>
          </div>
          <h1 id="auth-title">새 비밀번호 설정</h1>
          <p>새 비밀번호를 입력해주세요</p>
        </header>

        <!-- ===== 정상: 폼 노출 ===== -->
        <form action="#" method="post" novalidate class="form-section">

          <!-- 새 비밀번호 -->
          <div class="field">
            <label for="new-password" class="label">
              새 비밀번호 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <div class="input-wrap">
              <input
                id="new-password"
                name="newPassword"
                type="password"
                autocomplete="new-password"
                placeholder="10자 이상"
                class="input"
                required
                aria-required="true"
                minlength="10"
                aria-describedby="pw-rules"
              >
              <button
                type="button"
                class="input-suffix"
                aria-label="비밀번호 표시"
                aria-pressed="false"
                data-toggle-password="new-password"
              >
                <svg class="nav-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-eye"/></svg>
              </button>
            </div>

            <div class="pw-meter" data-level="4" aria-hidden="true">
              <div class="pw-meter-bars">
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
                <span class="pw-meter-bar"></span>
              </div>
              <span class="pw-meter-label">강함</span>
            </div>

            <ul id="pw-rules" class="pw-rules">
              <li class="met">10자 이상</li>
              <li class="met">영문 대/소문자 포함</li>
              <li class="met">숫자 포함</li>
              <li>특수문자 포함</li>
            </ul>
          </div>

          <!-- 새 비밀번호 확인 -->
          <div class="field">
            <label for="new-password-confirm" class="label">
              새 비밀번호 확인 <span class="req" aria-hidden="true">*</span>
              <span class="sr-only">필수</span>
            </label>
            <input
              id="new-password-confirm"
              name="newPasswordConfirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호 다시 입력"
              class="input"
              required
              aria-required="true"
              aria-describedby="new-password-confirm-error"
            >
            <p id="new-password-confirm-error" class="field-error" role="alert" hidden>
              <!-- 예시: 비밀번호가 일치하지 않습니다 -->
            </p>
          </div>

          <!-- 안내 -->
          <div class="alert alert-info" style="margin-top: var(--sp-4);">
            <svg class="alert-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-info"/></svg>
            <div class="alert-body">
              <p class="alert-message">변경 후 모든 기기에서 자동 로그아웃됩니다. 새 비밀번호로 다시 로그인해주세요.</p>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-5);">
            비밀번호 변경
          </button>

        </form>

        <!-- ===== 토큰 만료 (정적 — 참고용, 기본 hidden) ===== -->
        <div class="token-expired" hidden>
          <div class="alert alert-warning" role="alert">
            <svg class="alert-icon" aria-hidden="true"><use href="../_shared/icons.svg#i-alert"/></svg>
            <div class="alert-body">
              <p class="alert-title">링크가 만료되었습니다</p>
              <p class="alert-message">
                재설정 링크는 1시간 동안만 유효합니다. 다시 요청해주세요.
              </p>
            </div>
          </div>

          <a href="./forgot-password.html" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-5);">
            비밀번호 재설정 다시 요청
          </a>
        </div>

        <footer class="auth-card-footer">
          <a href="./login.html">로그인으로 돌아가기</a>
        </footer>

      </section>
    </main>
  </div>

</body>
</html>
