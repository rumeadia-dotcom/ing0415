<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="MarketCast — 네이버 스마트스토어 · 쿠팡 · G마켓 · 옥션 · 11번가 다중 마켓 상품 자동 등록 SaaS. 한 번 입력으로 5개 마켓에 동시 등록."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Studio 디자인 토큰 매칭: light 전용 (v1.3 다크모드 제거) -->
    <meta name="theme-color" content="oklch(0.975 0.008 75)" />
    <!-- cycle 49: 소셜 미리보기 (Open Graph) — 카카오톡 / 슬랙 / 메신저 공유 시 카드 표시.
         v1 은 셀러 전용 SaaS 라 외부 공유는 /legal/* 와 /manual 정도가 주 대상. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MarketCast — 다중 마켓 상품 자동 등록 SaaS" />
    <meta property="og:description" content="네이버 스마트스토어 · 쿠팡 · G마켓 · 옥션 · 11번가 — 한 번 입력으로 5개 마켓 동시 등록." />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="MarketCast" />
    <!-- Twitter Card (Twitter / X / LinkedIn 일부 fallback) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MarketCast" />
    <meta name="twitter:description" content="다중 마켓 상품 자동 등록 SaaS — 5개 마켓 동시 등록." />
    <!-- Google Fonts preconnect (Manrope + JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <title>MarketCast</title>
    <!--
      v1.3 다크모드 제거 (2026-05-22) — 라이트 전용. data-theme 속성도 사실상 불필요하나
      globals.css 의 :focus-visible / ::selection 이 oklch(var(--ring)) 참조하므로 안전하게 'light' 유지.
    -->
    <script>
      document.documentElement.setAttribute('data-theme', 'light')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
