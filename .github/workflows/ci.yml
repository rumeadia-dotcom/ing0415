name: CI

# 인용:
# - docs/architecture/v1/ops/ci-cd.md §2.2 / §3 / §11
# - CLAUDE.md "빌드 모드: dev / real" — PR 단계는 dev sanity 까지만.
# - docs/architecture/v1/security.md — dev 빌드도 실제와 동일 보안 경로 강제.
#
# 트리거 매트릭스:
#   pull_request  → develop / main / release/**
#   push          → develop / feature/** / release/** / hotfix/**
#
# ── 속도 최적화 전략 (feature/ci-fast-lane, 2026-05-30) ───────────────────────
# feature/** push 는 "빠른 레인" (lint+typecheck / unit) 만 돌린다.
# 무거운 잡 (build / e2e / pgTAP) 은 머지 게이트 시점에만 필요하므로
#   · pull_request (develop/main/release)
#   · push 가 develop/release/**/hotfix/** (통합·릴리즈 브랜치)
# 일 때만 실행 (run_heavy=true).
# 추가로 경로 필터로 무관한 잡을 skip 한다:
#   · build/e2e   → 앱·테스트·빌드설정 변경 시에만
#   · pgTAP RLS   → 마이그레이션·*.sql 변경 시에만
#
# branch protection 은 단일 "CI Gate" 잡만 required 로 둔다.
# Gate 는 needs 잡이 failure/cancelled 면 차단, skipped (경로필터·feature push)
# 는 허용 — 조건부/경로필터 잡이 required check 를 영구 pending 시키는 문제 회피.

on:
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'
  push:
    branches:
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 0. Setup — 실행 범위 판정 (무거운 잡 자격 + 경로 변경 감지)
  #    이후 모든 무거운 잡은 이 잡의 output 으로 gating.
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup (scope detection)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_heavy: ${{ steps.scope.outputs.run_heavy }}
      app: ${{ steps.filter.outputs.app }}
      sql: ${{ steps.filter.outputs.sql }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect heavy-suite eligibility
        id: scope
        run: |
          # feature/** push 만 빠른 레인. 그 외(PR / develop·release·hotfix push)는 풀 게이트.
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/heads/feature/* ]]; then
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::feature push — 빠른 레인(lint+typecheck/unit)만 실행."
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - 'apps/web/**'
              - 'tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'tailwind.config.ts'
              - 'postcss.config.*'
              - 'playwright.config.ts'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            sql:
              - 'apps/api/supabase/migrations/**'
              - 'apps/api/supabase/tests/**'
              - '.github/workflows/ci.yml'
            functions:
              - 'apps/api/supabase/functions/**'
              - '.github/workflows/ci.yml'

  # ──────────────────────────────────────────────────────────────────────────
  # 1. 정적 검증 — typecheck + lint (빠른 레인 핵심, 항상 실행)
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint (src + tests, blocking)
        run: pnpm lint

      # apps/api/supabase/functions/* 는 Deno 런타임 + 별도 lint 정책이 필요.
      # 현 시점 lint 에러 정리 전이므로 non-blocking job 으로 표면화만 한다.
      # 정리 후 continue-on-error 제거 + 메인 lint 잡에 병합.
      - name: Lint Edge Functions (non-blocking)
        run: pnpm exec eslint apps/api/supabase/functions --ext .ts,.tsx || true
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. 단위·통합 테스트 (Vitest) — 빠른 레인 핵심, 항상 실행
  #    zod 스키마 미러 검증(구 zod-schema-mirror-check 잡)을 여기 흡수해
  #    별도 러너(checkout+install) 1개를 제거한다.
  # ──────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit & Integration (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck
    env:
      # vitest 는 dev 빌드 모드와 무관하지만, Sentry/Supabase init 코드의
      # zod 검증을 통과시키기 위해 placeholder 환경변수가 필요할 수 있다.
      VITE_APP_MODE: dev
      VITE_USE_MOCK: 'true'
      VITE_SUPABASE_URL: https://dev.placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
      VITE_SENTRY_DSN: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest (run)
        run: pnpm test

      # zod 미러: 클라이언트 ↔ Edge Function ENUM/스키마 동기화 회귀 차단.
      # Stage G 에서 tests/unit/**/zod-mirror.test.ts 추가 시 자동 검증.
      - name: Zod mirror check (if present)
        run: |
          if pnpm exec vitest list 2>/dev/null | grep -qi 'zod-mirror'; then
            pnpm exec vitest run -t 'zod-mirror'
          else
            echo "::notice::zod-mirror.test.ts not present yet — skipping (Stage G follow-up)."
          fi

      - name: Upload coverage on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 3. 빌드 sanity — dev / real 두 모드 모두 빌드 성공해야 머지 가능
  #    real 모드 산출물은 mock 코드 누출 검사를 수행.
  #    (무거운 잡: run_heavy && app 경로 변경 시에만)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, lint-and-typecheck]
    if: ${{ needs.setup.outputs.run_heavy == 'true' && needs.setup.outputs.app == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        mode: [dev, real]
    env:
      VITE_APP_MODE: ${{ matrix.mode }}
      VITE_USE_MOCK: 'false'
      # PR CI 는 placeholder 시크릿으로 빌드 가능해야 한다.
      # 실제 시크릿은 deploy.yml 만 사용. 여기서는 "빌드가 깨지지 않는가" 만 검증.
      VITE_SUPABASE_URL: ${{ matrix.mode == 'real' && 'https://real.placeholder.supabase.co' || 'https://dev.placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ matrix.mode == 'real' && secrets.REAL_SUPABASE_ANON_KEY || secrets.DEBUG_SUPABASE_ANON_KEY }}
      VITE_SENTRY_DSN: ${{ matrix.mode == 'real' && secrets.REAL_SENTRY_DSN || secrets.DEBUG_SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (${{ matrix.mode }})
        run: pnpm build:${{ matrix.mode }}

      - name: Verify SPA 404 fallback artifact
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/404.html  || { echo "::error::dist/404.html missing (postbuild-spa.mjs failed?)"; exit 1; }
          # 두 파일이 동일해야 SPA 라우팅 복구가 일관됨.
          diff -q dist/index.html dist/404.html || { echo "::error::index.html ≠ 404.html"; exit 1; }

      - name: Real bundle leak scan
        if: matrix.mode == 'real'
        # platform.md / security.md — real 번들에 mock 픽스처·dev 리터럴이 절대 들어가지 않는다.
        # tree-shaking 회귀를 빌드 시점에 잡는다. 패턴은 휴리스틱이며 false positive 시 룰을 좁힌다.
        run: |
          set -e
          if grep -rE "window\.AppData|__MOCK_FIXTURES__|MockMarketAdapter|MOCK_SELLER" dist/assets/; then
            echo "::error::Debug-only artifacts leaked into real bundle"
            exit 1
          fi
          if grep -rE "VITE_APP_MODE['\"]?\s*[:=]\s*['\"]dev" dist/assets/; then
            echo "::error::dev mode literal embedded in real bundle"
            exit 1
          fi
          if grep -rE "VITE_USE_MOCK['\"]?\s*[:=]\s*['\"]true" dist/assets/; then
            echo "::error::useMock=true literal embedded in real bundle"
            exit 1
          fi
          # service_role / supabase secret token 형 패턴이 번들에 들어갔는지 이중 안전망.
          if grep -rE "service_role|sbp_v0_|sntrys_" dist/assets/; then
            echo "::error::Sensitive token-like string leaked into real bundle"
            exit 1
          fi
          echo "✓ real bundle leak scan clean"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.mode }}-${{ github.run_id }}
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────────
  # 4. E2E (Playwright, dev 빌드 산출물 사용)
  #    구 e2e-golden-path + e2e-a11y 두 잡을 단일 잡으로 통합 —
  #    checkout/install/playwright 설치/artifact 다운로드 중복 제거.
  #    골든패스 실패해도 a11y 결과까지 보도록 a11y 스텝은 !cancelled() 로 실행.
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (golden + a11y, Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    env:
      VITE_APP_MODE: dev
      VITE_SUPABASE_URL: https://dev.placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
      VITE_SENTRY_DSN: ''
      CI: 'true'
      E2E_BASE_URL: http://localhost:5174
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dev dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-dev-${{ github.run_id }}
          path: dist/

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit case)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # playwright.config.ts 의 webServer 가 CI 일 때 `pnpm preview --port 5174` 를 띄운다.
      - name: Run golden path
        run: pnpm test:e2e --project=chromium --grep "@golden"

      # 골든패스가 실패해도 a11y 회귀 신호까지 확보한다.
      - name: Run a11y axe regression
        if: ${{ !cancelled() }}
        run: pnpm test:e2e --project=chromium tests/e2e/a11y/

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 5. pgTAP RLS 회귀 (cross-tenant 격리 + KPI view 정확도)
  #    apps/api/supabase/tests/*.sql 자동 실행. 마이그/RLS 변경 PR 안전망.
  #    (무거운 잡: run_heavy && sql 경로 변경 시에만 — docker 스택 부팅 비용 회피)
  # ──────────────────────────────────────────────────────────────────────────
  pgtap-rls:
    name: pgTAP RLS (Supabase local)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup
    if: ${{ needs.setup.outputs.run_heavy == 'true' && needs.setup.outputs.sql == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      # supabase start 가 docker postgres + auth + 의존 컨테이너를 띄운다.
      # 마이그의 auth.users FK 의존성 때문에 단순 postgres service container
      # 로는 대체 불가. 가벼운 부팅을 위해 불필요 컨테이너는 제외한다.
      - name: Start Supabase local stack
        working-directory: apps/api
        run: |
          supabase start \
            --exclude realtime,storage-api,imgproxy,studio,mailpit,edge-runtime,logflare,vector,supavisor

      # supabase test db 는 격리된 임시 DB 에서 tests/*.sql 를 실행한다.
      - name: Run pgTAP tests
        working-directory: apps/api
        run: supabase test db

      - name: Capture Supabase logs on failure
        if: failure()
        working-directory: apps/api
        run: |
          supabase logs --service db --no-pager || true
          supabase logs --service auth --no-pager || true

      - name: Stop Supabase local stack
        if: always()
        working-directory: apps/api
        run: supabase stop --no-backup || true

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Deno Typecheck — Edge Functions(Deno 런타임) 타입 검증.
  #    pnpm typecheck(tsc) 는 apps/web 만 본다. Edge 코드 타입은 deno check 로만 검증되며,
  #    supabase functions deploy 가 check 를 안 거쳐 타입 에러가 운영까지 흘러갈 수 있다(C8).
  #    2026-05-31: OAuth refresh 런타임 버그가 deno check 부재로 잠재했던 사고 후 도입(#294).
  #    (무거운 잡: run_heavy && functions 경로 변경 시에만)
  # ──────────────────────────────────────────────────────────────────────────
  deno-check:
    name: Deno Typecheck (Edge Functions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    if: ${{ needs.setup.outputs.run_heavy == 'true' && needs.setup.outputs.functions == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # 각 Edge Function 의 entrypoint(index.ts)를 검사하면 의존 그래프(_shared 포함) 전체 타입 검증.
      # --node-modules-dir=none: npm: 스펙을 deno 글로벌 캐시로 resolve (루트 pnpm node_modules 무시).
      - name: Deno check Edge entrypoints
        run: deno check --node-modules-dir=none apps/api/supabase/functions/*/index.ts

  # ──────────────────────────────────────────────────────────────────────────
  # 7. CI Gate — branch protection 의 단일 required check.
  #    needs 잡이 failure/cancelled 면 차단. skipped (경로필터·feature push)
  #    는 허용 — 조건부 잡이 required check 를 영구 pending 시키는 문제를 회피.
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs: [setup, lint-and-typecheck, unit-test, build, e2e, pgtap-rls, deno-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify no gating job failed
        run: |
          # 각 잡 result: success / failure / cancelled / skipped
          # skipped (경로필터·feature push) 는 허용. failure/cancelled 만 차단.
          declare -A results=(
            [setup]="${{ needs.setup.result }}"
            [lint-and-typecheck]="${{ needs.lint-and-typecheck.result }}"
            [unit-test]="${{ needs.unit-test.result }}"
            [build]="${{ needs.build.result }}"
            [e2e]="${{ needs.e2e.result }}"
            [pgtap-rls]="${{ needs.pgtap-rls.result }}"
            [deno-check]="${{ needs.deno-check.result }}"
          )
          fail=0
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            echo "· $job = $r"
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Gating job '$job' result=$r"
              fail=1
            fi
          done
          if [[ "$fail" == "1" ]]; then
            echo "::error::CI Gate 차단 — 위 실패 잡 확인."
            exit 1
          fi
          echo "✓ CI Gate 통과 (모든 gating 잡 성공 또는 정당하게 skip)."
